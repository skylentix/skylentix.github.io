<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Control Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
min-height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);overflow:hidden;
transition:.4s;
}
body.light{background:linear-gradient(135deg,#74ebd5,#9face6)}
.card{
width:400px;padding:25px;border-radius:25px;color:#fff;
background:rgba(255,255,255,.12);backdrop-filter:blur(18px);
box-shadow:0 20px 40px rgba(0,0,0,.35);
animation:float 3s ease-in-out infinite;
}
@keyframes float{50%{transform:translateY(-8px)}}
input{width:75%;padding:10px;border:none;border-radius:10px}
button{padding:10px 12px;border:none;border-radius:10px;cursor:pointer}
.row{display:flex;gap:8px;margin:12px 0}
.info{display:none;text-align:center}
.temp{font-size:58px;font-weight:bold}
.small{margin-top:8px}
.top{display:flex;justify-content:space-between;margin-bottom:10px}
</style>
</head>
<body>
<div class="card">
<div class="top">
<div>
<div id="date"></div>
<div id="clock"></div>
</div>
<button onclick="toggleMode()">🌙/☀️</button>
</div>

<h2>🌤 Weather Control Pro</h2>

<div class="row">
<input id="city" placeholder="Enter city">
<button onclick="getWeather()">🔍</button>
</div>

<div class="info" id="info">
<h3 id="cityName"></h3>
<div id="icon" style="font-size:40px"></div>
<div class="temp" id="temp"></div>
<div id="condition"></div>
<div class="small">🌡️ Feels Like: <span id="feels"></span></div>
<div class="small">💨 Wind: <span id="wind"></span></div>
<div class="small">💧 Humidity: <span id="humidity"></span></div>
</div>
</div>

<script>
function toggleMode(){document.body.classList.toggle('light')}

setInterval(()=>{
const d=new Date();
document.getElementById('clock').innerText=d.toLocaleTimeString();
document.getElementById('date').innerText=d.toDateString();
},1000);

function iconFrom(text){
text=text.toLowerCase();
if(text.includes('sun')) return '☀️';
if(text.includes('rain')) return '🌧️';
if(text.includes('cloud')) return '☁️';
if(text.includes('storm')) return '⛈️';
return '🌤️';
}

async function showWeather(url,label){
const r=await fetch(url);
const data=await r.json();
const c=data.current_condition[0];
document.getElementById('cityName').innerText=label;
document.getElementById('temp').innerText=c.temp_C+'°C';
document.getElementById('condition').innerText=c.weatherDesc[0].value;
document.getElementById('icon').innerText=iconFrom(c.weatherDesc[0].value);
document.getElementById('feels').innerText=c.FeelsLikeC+'°C';
document.getElementById('wind').innerText=c.windspeedKmph+' km/h';
document.getElementById('humidity').innerText=c.humidity+'%';
document.getElementById('info').style.display='block';
}

async function getWeather(){
const city=document.getElementById('city').value;
if(!city) return alert('Enter a city');
showWeather(`https://wttr.in/${city}?format=j1`, city);
}

window.onload=()=>{
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async p=>{
showWeather(`https://wttr.in/${p.coords.latitude},${p.coords.longitude}?format=j1`,'Your Location');
});
}
}
</script>
</body>
</html>
